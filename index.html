<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国际象棋开局学习游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

.container { max-width: 1100px; margin: 0 auto; padding: 20px; }

h1 { text-align: center; font-size: 1.8em; margin-bottom: 8px; color: #e0c068; }
.subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.95em; }

/* Navigation tabs */
.tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.tab { padding: 10px 22px; border: 2px solid #333; border-radius: 8px; cursor: pointer; background: #16213e; transition: all 0.2s; font-size: 0.95em; color: #ccc; }
.tab:hover { border-color: #e0c068; color: #e0c068; }
.tab.active { background: #e0c068; color: #1a1a2e; border-color: #e0c068; font-weight: 600; }

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Chessboard */
.game-area { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
.board-container { flex-shrink: 0; }
.board-wrapper { position: relative; display: inline-block; }
.board-coords-left { position: absolute; left: -20px; top: 0; height: 480px; display: flex; flex-direction: column; }
.board-coords-left span { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #887755; width: 18px; }
.board-coords-bottom { display: flex; margin-left: 0; height: 20px; }
.board-coords-bottom span { width: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #887755; }
.board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 3px solid #e0c068; border-radius: 4px; overflow: hidden; }
.square { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; user-select: none; position: relative; }
/* Corner coordinate labels inside squares */
.square .coord-file, .square .coord-rank {
  position: absolute; font-size: 10px; font-weight: 600; pointer-events: none; line-height: 1;
}
.square .coord-rank { top: 2px; left: 3px; }
.square .coord-file { bottom: 1px; right: 3px; }
.square.light .coord-file, .square.light .coord-rank { color: #b58863; }
.square.dark .coord-file, .square.dark .coord-rank { color: #f0d9b5; }
.square.light { background: #f0d9b5; }
.square.dark { background: #b58863; }
.square svg { pointer-events: none; }
.square.highlight { box-shadow: inset 0 0 0 4px rgba(0, 150, 255, 0.85); }
.square.last-move { box-shadow: inset 0 0 0 3px rgba(224, 192, 104, 0.5); }
.square.correct { animation: correctFlash 0.5s; }
@keyframes correctFlash { 0%,100%{ background: inherit; } 50%{ background: #4caf50; } }
.square.wrong { animation: wrongFlash 0.5s; }
@keyframes wrongFlash { 0%,100%{ background: inherit; } 50%{ background: #f44336; } }
.square.capture { animation: captureFlash 0.7s; }
@keyframes captureFlash { 0%{ box-shadow: inset 0 0 0 0 rgba(244,67,54,0.8); } 30%{ box-shadow: inset 0 0 20px 6px rgba(244,67,54,0.7); } 100%{ box-shadow: none; } }

/* Side panel */
.side-panel { flex: 1; min-width: 280px; max-width: 400px; }
.info-box { background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 16px; border: 1px solid #333; }
.info-box h3 { color: #e0c068; margin-bottom: 10px; font-size: 1.1em; }
.info-box p { color: #bbb; line-height: 1.6; font-size: 0.92em; }

.move-list { font-family: 'Courier New', monospace; background: #0f0f23; padding: 12px; border-radius: 6px; min-height: 60px; color: #e0c068; font-size: 0.95em; line-height: 1.8; }
.move-list .move-num { color: #666; }
.move-list .current-move { background: #e0c068; color: #1a1a2e; padding: 2px 4px; border-radius: 3px; }

/* Buttons */
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95em; transition: all 0.2s; }
.btn-primary { background: #e0c068; color: #1a1a2e; font-weight: 600; }
.btn-primary:hover { background: #c8a84e; }
.btn-secondary { background: #333; color: #ccc; }
.btn-secondary:hover { background: #444; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* Quiz */
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
.quiz-option { padding: 14px; background: #16213e; border: 2px solid #333; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.2s; font-size: 0.95em; }
.quiz-option:hover { border-color: #e0c068; color: #e0c068; }
.quiz-option.correct-answer { border-color: #4caf50; background: #1b3d1b; color: #4caf50; }
.quiz-option.wrong-answer { border-color: #f44336; background: #3d1b1b; color: #f44336; }

/* Score */
.score-bar { display: flex; justify-content: space-between; align-items: center; background: #16213e; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; border: 1px solid #333; }
.score-item { text-align: center; }
.score-item .label { font-size: 0.8em; color: #888; }
.score-item .value { font-size: 1.3em; color: #e0c068; font-weight: 600; }

/* Library */
.library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.opening-card { background: #16213e; border: 1px solid #333; border-radius: 10px; padding: 18px; cursor: pointer; transition: all 0.2s; }
.opening-card:hover { border-color: #e0c068; transform: translateY(-2px); }
.opening-card h4 { color: #e0c068; margin-bottom: 4px; }
.opening-card .eco { color: #888; font-size: 0.85em; margin-bottom: 8px; }
.opening-card .moves { font-family: 'Courier New', monospace; color: #aaa; font-size: 0.9em; margin-bottom: 8px; }
.opening-card .desc { color: #999; font-size: 0.88em; line-height: 1.5; }
.opening-card .tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.opening-card .tag { font-size: 0.75em; padding: 3px 8px; border-radius: 4px; background: #0f0f23; color: #e0c068; }

/* Category filter */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border: 1px solid #333; border-radius: 20px; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em; transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { border-color: #e0c068; color: #e0c068; }

/* Feedback message */
.feedback { padding: 12px; border-radius: 8px; text-align: center; margin-top: 12px; font-weight: 500; display: none; }
.feedback.show { display: block; }
.feedback.success { background: #1b3d1b; color: #4caf50; border: 1px solid #4caf50; }
.feedback.error { background: #3d1b1b; color: #f44336; border: 1px solid #f44336; }
.feedback.info { background: #1b2d3d; color: #64b5f6; border: 1px solid #64b5f6; }

/* Progress bar */
.progress-bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 12px; }
.progress-fill { height: 100%; background: #e0c068; transition: width 0.3s; border-radius: 3px; }

/* Speech bubbles — left of board */
.board-with-bubbles { display: flex; align-items: stretch; gap: 0; }
.bubble-col { width: 180px; display: flex; flex-direction: column; flex-shrink: 0; position: relative; }
.bubble-col .bubble-zone { flex: 1; display: flex; align-items: flex-end; padding: 4px 0; }
.bubble-col .bubble-zone.black { align-items: flex-start; }
.speech-bubble { background: rgba(15,15,35,0.93); color: #ddd; padding: 10px 12px; border-radius: 10px; font-size: 0.82em; line-height: 1.5; cursor: pointer; position: relative; margin-right: 10px; opacity: 0; pointer-events: none; transition: opacity 0.3s; word-break: break-word; border: 1px solid #444; }
.speech-bubble.show { opacity: 1; pointer-events: auto; }
/* Arrow pointing right */
.speech-bubble::after { content: ''; position: absolute; right: -8px; border: 8px solid transparent; border-right: none; }
.speech-bubble.white-bubble { border-color: #e0c068; }
.speech-bubble.white-bubble::after { bottom: 16px; border-left-color: #e0c068; }
.speech-bubble.black-bubble { border-color: #9ec5e0; }
.speech-bubble.black-bubble::after { top: 16px; border-left-color: #9ec5e0; }
.speech-bubble.error-bubble { border-color: #f44336; background: rgba(60,20,20,0.95); }
.speech-bubble.error-bubble::after { border-left-color: #f44336; }
.speech-bubble.error-bubble .tip-side { color: #f44336; }
.mistake-btn { display: inline-block; margin-top: 8px; padding: 6px 14px; background: #e0c068; color: #1a1a2e; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82em; font-weight: 600; width: 100%; text-align: center; transition: background 0.2s; }
.mistake-btn:hover { background: #c8a84e; }
.speech-bubble .tip-side { font-weight: 600; }
.speech-bubble.white-bubble .tip-side { color: #e0c068; }
.speech-bubble.black-bubble .tip-side { color: #9ec5e0; }
.speech-bubble .tip-dismiss { display: block; color: #666; font-size: 0.75em; margin-top: 6px; text-align: right; }

/* Demo panel in side panel */
.chat-inline { background: #16213e; border: 1px solid #333; border-radius: 10px; overflow: hidden; margin-top: 12px; }
.chat-inline .chat-header { padding: 10px 14px; background: #0f0f23; border-bottom: 1px solid #333; }
.chat-inline .chat-header h4 { color: #e0c068; font-size: 0.9em; margin: 0; }
.chat-messages { overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; max-height: 260px; min-height: 40px; }
.chat-msg { padding: 6px 10px; border-radius: 8px; font-size: 0.84em; line-height: 1.5; word-break: break-word; background: #0f0f23; color: #ccc; }
/* Demo buttons */
.demo-btn { display: inline-block; margin-top: 6px; padding: 6px 16px; background: #e0c068; color: #1a1a2e; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: background 0.2s; }
.demo-btn:hover { background: #c8a84e; }
.demo-btn:disabled { opacity: 0.5; cursor: default; }
.demo-nav { display: flex; gap: 6px; padding: 8px 10px; }
.demo-nav .demo-btn { flex: 1; text-align: center; }
.demo-nav .demo-btn.secondary { background: #333; color: #ccc; }
.demo-nav .demo-btn.secondary:hover { background: #444; }

/* Responsive */
@media (max-width: 700px) {
  .bubble-col { width: 140px; }
  .speech-bubble { font-size: 0.78em; padding: 8px 10px; }
}
/* Responsive — mobile */
@media (max-width: 520px) {
  .container { padding: 10px 6px; overflow-x: hidden; }
  h1 { font-size: 1.3em; margin-bottom: 4px; }
  .subtitle { font-size: 0.82em; margin-bottom: 12px; }

  /* Tabs: 2×2 grid */
  .tabs { gap: 4px; margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr; }
  .tab { padding: 8px 10px; font-size: 0.82em; text-align: center; }

  /* Board scales to screen width */
  .board-container { flex-shrink: 1; width: 100%; overflow: hidden; }
  .board-wrapper { display: block; width: 100%; }
  .board-with-bubbles { flex-direction: column; }
  .board { grid-template-columns: repeat(8, 1fr) !important; grid-template-rows: repeat(8, 1fr) !important; width: 100% !important; border-width: 2px; aspect-ratio: 1; }
  .square { width: auto !important; height: auto !important; aspect-ratio: 1; font-size: min(6vw, 28px) !important; }
  .square .coord-file, .square .coord-rank { font-size: 7px; }
  .square svg { width: min(8vw, 32px) !important; height: min(8vw, 32px) !important; }

  /* Bubbles below board */
  .bubble-col { width: 100%; flex-direction: row; height: auto; gap: 4px; margin-top: 4px; }
  .bubble-col .bubble-zone { flex: 1; padding: 2px; align-items: flex-start; }
  .speech-bubble { margin-right: 0; font-size: 0.78em; padding: 8px 10px; border-radius: 8px; }
  .speech-bubble::after { display: none; }

  /* Vertical stack */
  .game-area { flex-direction: column; align-items: stretch; gap: 12px; }
  .side-panel { min-width: unset; max-width: 100%; width: 100%; }

  /* Compact elements */
  .info-box { padding: 12px; margin-bottom: 10px; }
  .info-box h3 { font-size: 0.95em; }
  .info-box p { font-size: 0.85em; }
  .score-bar { padding: 8px 10px; flex-wrap: wrap; gap: 4px; }
  .score-item .value { font-size: 1em; }
  .score-item .label { font-size: 0.72em; }
  .btn { padding: 8px 14px; font-size: 0.85em; }
  .btn-group { gap: 6px; flex-wrap: wrap; }
  .quiz-options { grid-template-columns: 1fr; gap: 8px; }
  .quiz-option { padding: 10px; font-size: 0.88em; }
  .library-grid { grid-template-columns: 1fr; gap: 10px; }
  .opening-card { padding: 14px; }
  .opening-card .desc { font-size: 0.82em; }
  .filter-bar { gap: 5px; }
  .filter-btn { padding: 5px 10px; font-size: 0.8em; }
  .move-list { padding: 8px; font-size: 0.85em; min-height: 40px; }

  /* Demo nav fixed at bottom */
  .chat-messages { max-height: 150px; }
  .demo-nav { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 12px; background: #16213e; border-top: 2px solid #e0c068; z-index: 100; }
  .demo-nav .demo-btn { padding: 12px 10px; font-size: 0.9em; }
  .panel-practice-demo-active { padding-bottom: 70px; }
}
</style>
</head>
<body>

<div class="container">
  <h1>♚ 国际象棋开局学习</h1>
  <p class="subtitle">通过互动游戏掌握经典开局</p>

  <div class="tabs">
    <div class="tab active" data-panel="library">📚 开局百科</div>
    <div class="tab" data-panel="practice">🎯 跟走练习</div>
    <div class="tab" data-panel="quiz">❓ 开局问答</div>
    <div class="tab" data-panel="guess">🔍 猜开局名</div>
  </div>

  <!-- Library Panel -->
  <div class="panel active" id="panel-library">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="library-grid" id="library-grid"></div>
  </div>

  <!-- Practice Panel: Follow the opening moves -->
  <div class="panel" id="panel-practice">
    <div class="score-bar">
      <div class="score-item"><div class="label">当前开局</div><div class="value" id="practice-name">-</div></div>
      <div class="score-item"><div class="label">进度</div><div class="value" id="practice-progress">0/0</div></div>
      <div class="score-item"><div class="label">连续正确</div><div class="value" id="practice-streak">0</div></div>
    </div>
    <div class="game-area">
      <div class="board-container">
        <div class="board-with-bubbles">
          <div class="bubble-col">
            <div class="bubble-zone black">
              <div class="speech-bubble black-bubble" id="tip-black" onclick="this.classList.remove('show')"></div>
            </div>
            <div class="bubble-zone white">
              <div class="speech-bubble white-bubble" id="tip-white" onclick="this.classList.remove('show')"></div>
            </div>
          </div>
          <div class="board-wrapper">
            <div class="board" id="practice-board"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
          <button class="btn btn-secondary" id="nav-back" onclick="navigateBack()" style="padding:6px 14px;font-size:1.1em;" title="后退" disabled>&larr;</button>
          <div class="progress-bar" style="flex:1;margin-top:0;"><div class="progress-fill" id="practice-bar"></div></div>
          <button class="btn btn-secondary" id="nav-forward" onclick="navigateForward()" style="padding:6px 14px;font-size:1.1em;" title="前进" disabled>&rarr;</button>
        </div>
      </div>
      <div class="side-panel">
        <div class="info-box">
          <h3 id="practice-title">选择一个开局开始练习</h3>
          <p id="practice-desc">在左侧棋盘上走出正确的下一步棋。系统会提示你该轮到哪一方走棋。</p>
        </div>
        <div class="info-box">
          <h3>走法记录</h3>
          <div class="move-list" id="practice-moves">等待开始...</div>
        </div>
        <div class="feedback" id="practice-feedback"></div>
        <div class="btn-group">
          <button class="btn btn-primary" id="practice-new" onclick="pickRandomPractice()">随机开局</button>
          <button class="btn btn-secondary" onclick="resetPractice()">重新开始</button>
          <button class="btn btn-secondary" onclick="showHint()">💡 提示</button>
        </div>
        <!-- Continuation demo panel -->
        <div class="chat-inline" id="demo-panel" style="display:none">
          <div class="chat-header">
            <h4>📖 后续典型走法</h4>
          </div>
          <div class="chat-body" id="demo-body">
            <div class="chat-messages" id="demo-messages"></div>
            <div class="demo-nav" id="demo-nav" style="display:none;">
              <button class="demo-btn secondary" id="demo-prev" onclick="demoPrev()">← 上一步</button>
              <button class="demo-btn" id="demo-advance" onclick="demoAdvance()">下一步 →</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quiz Panel -->
  <div class="panel" id="panel-quiz">
    <div class="score-bar">
      <div class="score-item"><div class="label">得分</div><div class="value" id="quiz-score">0</div></div>
      <div class="score-item"><div class="label">题目</div><div class="value" id="quiz-num">0/10</div></div>
      <div class="score-item"><div class="label">正确率</div><div class="value" id="quiz-rate">-</div></div>
    </div>
    <div class="game-area">
      <div class="board-container">
        <div class="board" id="quiz-board"></div>
      </div>
      <div class="side-panel">
        <div class="info-box">
          <h3>关于这个开局的说法，哪个是正确的？</h3>
          <p id="quiz-question"></p>
        </div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="feedback" id="quiz-feedback"></div>
        <div class="btn-group">
          <button class="btn btn-primary" id="quiz-next" onclick="nextQuizQuestion()" style="display:none">下一题 →</button>
          <button class="btn btn-primary" id="quiz-start" onclick="startQuiz()">开始问答</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Guess Panel -->
  <div class="panel" id="panel-guess">
    <div class="score-bar">
      <div class="score-item"><div class="label">得分</div><div class="value" id="guess-score">0</div></div>
      <div class="score-item"><div class="label">题目</div><div class="value" id="guess-num">0/10</div></div>
      <div class="score-item"><div class="label">连续正确</div><div class="value" id="guess-streak">0</div></div>
    </div>
    <div class="game-area">
      <div class="board-container">
        <div class="board" id="guess-board"></div>
      </div>
      <div class="side-panel">
        <div class="info-box">
          <h3>这是什么开局？</h3>
          <p id="guess-hint">观察棋盘上的局面，猜猜这是哪个开局。</p>
        </div>
        <div class="quiz-options" id="guess-options"></div>
        <div class="feedback" id="guess-feedback"></div>
        <div class="btn-group">
          <button class="btn btn-primary" id="guess-next" onclick="nextGuess()" style="display:none">下一题 →</button>
          <button class="btn btn-primary" id="guess-start" onclick="startGuess()">开始猜题</button>
        </div>
      </div>
    </div>
  </div>
</div>


<script>
// ============================================================
// Chess Openings Knowledge Base
// ============================================================
const OPENINGS = [
  // === King's Pawn (1.e4) ===
  {
    name: "意大利开局", nameEn: "Italian Game", eco: "C50-C54",
    category: "e4 开局", playerSide: "white",
    moves: ["e2e4","e7e5","g1f3","b8c6","f1c4","f8c5"],
    pgn: "1.e4 e5 2.Nf3 Nc6 3.Bc4 Bc5",
    desc: "最古老的开局之一，白方将象指向f7弱点，争夺中心控制权。局面开放，双方快速出子。",
    traits: ["开放性局面","快速发展","攻击f7"],
    moveExplain: [
      "e4：占据中心，打开象和后的出路，控制d5和f5",
      "e5：黑方对称应对，同样占据中心，控制d4和f4",
      "Nf3：发展马的同时攻击e5兵，是最自然的发展着法",
      "Nc6：保护e5兵，同时发展马到活跃位置",
      "Bc4：象指向f7——开局中黑方最薄弱的点（只有国王保护），同时控制d5",
      "Bc5：黑方对称发展象，瞄准f2（白方的对称弱点），形成意大利对称局面"
    ],
    continuation: {
      label: "意大利开局典型续招",
      moves: ["c2c3","g8f6","d2d4","e5d4","c3d4","c5b4","b1c3"],
      explain: ["c3：准备d4中心突破","Nf6：黑方发展马","d4：白方推进中心！这是意大利开局的关键时刻","exd4：黑方被迫吃掉","cxd4：白方获得强大的兵中心","Bb4+：黑方反击，钉住马","Nc3：挡住将军，进入活跃局面"]
    },
    quiz: [
      { q: "意大利开局中白方的象指向哪个弱点？", a: "f7", wrong: ["e5","d5","g7"] },
      { q: "意大利开局属于哪类开局？", a: "开放性开局", wrong: ["封闭性开局","半开放开局","侧翼开局"] },
    ],

const INITIAL_BOARD = [
  ['r','n','b','q','k','b','n','r'],
  ['p','p','p','p','p','p','p','p'],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['P','P','P','P','P','P','P','P'],
  ['R','N','B','Q','K','B','N','R'],
];

function cloneBoard(b) { return b.map(r => [...r]); }

function applyMove(board, moveStr) {
  const fc = moveStr.charCodeAt(0) - 97, fr = 8 - parseInt(moveStr[1]);
  const tc = moveStr.charCodeAt(2) - 97, tr = 8 - parseInt(moveStr[3]);
  const b = cloneBoard(board);
  b[tr][tc] = b[fr][fc];
  b[fr][fc] = '';
  return b;
}

function boardAfterMoves(moves) {
  let b = cloneBoard(INITIAL_BOARD);
  for (const m of moves) b = applyMove(b, m);
  return b;
}

let boardFlipped = false;

function renderBoard(containerId, board, onClick) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const files = 'abcdefgh';
  const flipped = boardFlipped;
  for (let ri = 0; ri < 8; ri++) {
    for (let ci = 0; ci < 8; ci++) {
      const r = flipped ? 7 - ri : ri;
      const c = flipped ? 7 - ci : ci;
      const sq = document.createElement('div');
      sq.className = 'square ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
      sq.dataset.row = r;
      sq.dataset.col = c;
      const piece = board[r][c];
      if (piece && PIECE_SVG[piece]) {
        const svgWrapper = document.createElement('div');
        svgWrapper.style.cssText = 'width:80%;height:80%;display:flex;align-items:center;justify-content:center;pointer-events:none;';
        svgWrapper.innerHTML = PIECE_SVG[piece]();
        sq.appendChild(svgWrapper);
      }
      // Rank numbers on leftmost display column
      if (ci === 0) {
        const rank = document.createElement('span');
        rank.className = 'coord-rank';
        rank.textContent = 8 - r;
        sq.appendChild(rank);
      }
      // File letters on bottom display row
      if (ri === 7) {
        const file = document.createElement('span');
        file.className = 'coord-file';
        file.textContent = files[c];
        sq.appendChild(file);
      }
      if (onClick) sq.addEventListener('click', () => onClick(r, c, piece));
      container.appendChild(sq);
    }
  }
}

function findSquare(containerId, row, col) {
  const container = document.getElementById(containerId);
  for (const sq of container.children) {
    if (sq.dataset.row == row && sq.dataset.col == col) return sq;
  }
  return null;
}

function highlightSquare(containerId, row, col, cls) {
  const sq = findSquare(containerId, row, col);
  if (sq) { sq.classList.add(cls); setTimeout(() => sq.classList.remove(cls), 600); }
}

function setHighlight(containerId, row, col, on) {
  const sq = findSquare(containerId, row, col);
  if (sq) { if (on) sq.classList.add('highlight'); else sq.classList.remove('highlight'); }
}

function clearHighlights(containerId) {
  const container = document.getElementById(containerId);
  for (const sq of container.children) sq.classList.remove('highlight', 'last-move');
}

function showFeedback(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'feedback show ' + type;
}
function hideFeedback(id) {
  document.getElementById(id).className = 'feedback';
}

function renderLibrary(filter) {
  const grid = document.getElementById('library-grid');
  grid.innerHTML = '';
  const list = filter ? OPENINGS.filter(o => o.category === filter) : OPENINGS;
  list.forEach(o => {
    const card = document.createElement('div');
    card.className = 'opening-card';
    card.innerHTML = `
      <h4>${o.name}</h4>
      <div class="eco">${o.nameEn} · ${o.eco}</div>
      <div class="moves">${o.pgn}</div>
      <div class="desc">${o.desc}</div>
      <div class="tags">${o.traits.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    `;
    card.addEventListener('click', () => {
      // Switch to practice with this opening
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector('[data-panel="practice"]').classList.add('active');
      document.getElementById('panel-practice').classList.add('active');
      startPractice(o);
    });
    grid.appendChild(card);
  });
}

function setupFilters() {
  const bar = document.getElementById('filter-bar');
  const categories = ['全部', ...new Set(OPENINGS.map(o => o.category))];
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === '全部' ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLibrary(cat === '全部' ? null : cat);
    });
    bar.appendChild(btn);
  });
}

setupFilters();
renderLibrary();

// Practice Mode: Follow the opening moves
// ============================================================
let practiceState = { opening: null, board: null, moveIndex: 0, selected: null, streak: 0, autoPlaying: false, maxMoveIndex: 0, browsing: false };
let autoPlayTimeout = null;

function startPractice(opening) {
  if (autoPlayTimeout) { clearTimeout(autoPlayTimeout); autoPlayTimeout = null; }
  practiceState = { opening, board: cloneBoard(INITIAL_BOARD), moveIndex: 0, selected: null, streak: practiceState.streak, autoPlaying: false, maxMoveIndex: 0, browsing: false };
  // Flip board when player is black
  boardFlipped = (opening.playerSide === 'black');
  document.getElementById('practice-name').textContent = opening.name.length > 12 ? opening.name.substring(0,12)+'…' : opening.name;
  document.getElementById('practice-title').textContent = opening.name;
  document.getElementById('practice-desc').textContent = opening.desc;
  updatePracticeProgress();
  renderBoard('practice-board', practiceState.board, onPracticeClick);
  renderPracticeMoves();
  hideFeedback('practice-feedback');
  hideAllTips();
  // Hide demo panel, reset for new opening
  document.getElementById('demo-panel').style.display = 'none';
  document.getElementById('demo-messages').innerHTML = '';
  document.getElementById('demo-nav').style.display = 'none';
  document.body.classList.remove('panel-practice-demo-active');
  demoPlaying = false;
  demoState = null;
  updateNavButtons();
  autoPlayOpponent();
}

function updatePracticeProgress() {
  const o = practiceState.opening;
  if (!o) return;
  const total = o.moves.length;
  const current = practiceState.moveIndex;
  document.getElementById('practice-progress').textContent = `${current}/${total}`;
  document.getElementById('practice-bar').style.width = (current / total * 100) + '%';
  document.getElementById('practice-streak').textContent = practiceState.streak;
}

function renderPracticeMoves() {
  const el = document.getElementById('practice-moves');
  if (!practiceState.opening) { el.textContent = '等待开始...'; return; }
  const moves = practiceState.opening.moves;
  let html = '';
  for (let i = 0; i < moves.length; i++) {
    if (i % 2 === 0) html += `<span class="move-num">${Math.floor(i/2)+1}.</span>`;
    const m = moves[i];
    const notation = moveToNotation(m, i);
    if (i < practiceState.moveIndex) {
      html += notation + ' ';
    } else if (i === practiceState.moveIndex) {
      html += `<span class="current-move">???</span> `;
    } else {
      html += '… ';
    }
  }
  el.innerHTML = html;
}

function moveToNotation(moveStr, moveIdx) {
  // Simple conversion for display
  const fc = String.fromCharCode(97 + (moveStr.charCodeAt(0) - 97));
  const fr = moveStr[1];
  const tc = String.fromCharCode(97 + (moveStr.charCodeAt(2) - 97));
  const tr = moveStr[3];
  return `${fc}${fr}-${tc}${tr}`;
}

let practiceSelected = null;

function onPracticeClick(row, col, piece) {
  if (!practiceState.opening) return;
  if (demoPlaying) return;
  if (practiceState.autoPlaying) return;
  if (practiceState.moveIndex >= practiceState.opening.moves.length) return;

  // 如果在浏览历史走法，点击棋盘回到当前位置
  if (practiceState.browsing) {
    practiceState.moveIndex = practiceState.maxMoveIndex;
    practiceState.board = boardAfterMoves(practiceState.opening.moves.slice(0, practiceState.moveIndex));
    practiceState.browsing = false;
    renderBoard('practice-board', practiceState.board, onPracticeClick);
    updatePracticeProgress();
    renderPracticeMoves();
    updateNavButtons();
    hideFeedback('practice-feedback');
    return;
  }

  hideAllTips();

  const expectedMove = practiceState.opening.moves[practiceState.moveIndex];
  const playerSide = practiceState.opening.playerSide || 'white';
  const isWhiteTurn = practiceState.moveIndex % 2 === 0;

  if (practiceSelected === null) {
    // Selecting a piece
    if (!piece) return;
    const isWhitePiece = piece === piece.toUpperCase();
    if (isWhiteTurn !== isWhitePiece) {
      const sideMsg = playerSide === 'white' ? '你执白方，请选择白色棋子' : '你执黑方，请选择黑色棋子';
      showFeedback('practice-feedback', sideMsg, 'info');
      return;
    }
    practiceSelected = { row, col };
    clearHighlights('practice-board');
    setHighlight('practice-board', row, col, true);
    hideFeedback('practice-feedback');
  } else {
    // Making a move — or re-selecting a different piece
    const fromCol = practiceSelected.col;
    const fromRow = practiceSelected.row;

    // If clicking on another piece of the same color, re-select it instead of treating as a move
    if (piece) {
      const clickedIsWhite = piece === piece.toUpperCase();
      const selectedIsWhite = isWhiteTurn; // player's side
      if (clickedIsWhite === selectedIsWhite && (row !== fromRow || col !== fromCol)) {
        clearHighlights('practice-board');
        practiceSelected = { row, col };
        setHighlight('practice-board', row, col, true);
        hideFeedback('practice-feedback');
        return;
      }
    }

    const moveStr = String.fromCharCode(97 + fromCol) + (8 - fromRow) + String.fromCharCode(97 + col) + (8 - row);

    clearHighlights('practice-board');
    practiceSelected = null;

    if (moveStr === expectedMove) {
      // Correct!
      const justCompletedIdx = practiceState.moveIndex;
      practiceState.board = applyMove(practiceState.board, moveStr);
      practiceState.moveIndex++;
      practiceState.maxMoveIndex = practiceState.moveIndex;
      practiceState.browsing = false;
      practiceState.streak++;
      renderBoard('practice-board', practiceState.board, onPracticeClick);
      highlightSquare('practice-board', row, col, 'correct');
      updatePracticeProgress();
      renderPracticeMoves();
      updateNavButtons();

      // Auto-comment from assistant
      autoExplainMove(justCompletedIdx);

      if (practiceState.moveIndex >= practiceState.opening.moves.length) {
        showFeedback('practice-feedback', '完美！你完成了「' + practiceState.opening.name + '」的所有走法！', 'success');
      } else {
        hideFeedback('practice-feedback');
        autoPlayOpponent();
      }
    } else {
      // Wrong move
      practiceState.streak = 0;
      practiceSelected = null;
      updatePracticeProgress();
      highlightSquare('practice-board', row, col, 'wrong');
      showMistakeFeedback(moveStr);
    }
  }
}

let punishmentState = null;

function showMistakeFeedback(wrongMoveStr) {
  const opening = practiceState.opening;
  if (!opening) return;
  const moveIdx = practiceState.moveIndex;
  const isWhite = moveIdx % 2 === 0;
  const side = isWhite ? 'white' : 'black';
  const sideLabel = isWhite ? '❌ 白方' : '❌ 黑方';

  const mistake = opening.mistakes && opening.mistakes.find(
    m => m.atMove === moveIdx && m.wrong === wrongMoveStr
  );

  const tip = document.getElementById(side === 'white' ? 'tip-white' : 'tip-black');
  tip.innerHTML = '';

  if (mistake) {
    const sideSpan = document.createElement('span');
    sideSpan.className = 'tip-side';
    sideSpan.textContent = sideLabel;
    tip.appendChild(sideSpan);
    tip.appendChild(document.createTextNode(' ' + mistake.explain));

    const btn = document.createElement('button');
    btn.className = 'mistake-btn';
    btn.textContent = '👁 看看后果';
    btn.onclick = playPunishment;
    tip.appendChild(btn);

    const dismiss = document.createElement('span');
    dismiss.className = 'tip-dismiss';
    dismiss.textContent = '点击泡泡关闭';
    tip.appendChild(dismiss);

    tip.className = 'speech-bubble error-bubble show';
    punishmentState = { mistake, boardBeforeWrong: cloneBoard(practiceState.board), wrongMove: wrongMoveStr };
  } else {
    const correctMove = opening.moves[moveIdx];
    const explain = opening.moveExplain && opening.moveExplain[moveIdx] ? opening.moveExplain[moveIdx] : '';

    const sideSpan = document.createElement('span');
    sideSpan.className = 'tip-side';
    sideSpan.textContent = sideLabel;
    tip.appendChild(sideSpan);
    tip.appendChild(document.createTextNode(' 这步不是主线走法。正确走法：' + moveToNotation(correctMove, moveIdx)));

    if (explain) {
      const small = document.createElement('small');
      small.style.cssText = 'color:#aaa;display:block;margin-top:4px;';
      small.textContent = explain;
      tip.appendChild(small);
    }

    const dismiss = document.createElement('span');
    dismiss.className = 'tip-dismiss';
    dismiss.textContent = '点击泡泡关闭';
    tip.appendChild(dismiss);

    tip.className = 'speech-bubble error-bubble show';
    punishmentState = null;
  }
}

function playPunishment() {
  if (!punishmentState) return;
  const { mistake, boardBeforeWrong, wrongMove } = punishmentState;

  let board = applyMove(boardBeforeWrong, wrongMove);
  const boards = [board];
  for (const m of mistake.punishment) {
    board = applyMove(board, m);
    boards.push(cloneBoard(board));
  }

  practiceState.autoPlaying = true;
  hideAllTips();

  renderBoard('practice-board', boards[0], onPracticeClick);
  const wtc = wrongMove.charCodeAt(2) - 97, wtr = 8 - parseInt(wrongMove[3]);
  highlightSquare('practice-board', wtr, wtc, 'wrong');

  let step = 0;
  const interval = setInterval(() => {
    if (step >= mistake.punishment.length) {
      clearInterval(interval);
      const isWhite = practiceState.moveIndex % 2 === 0;
      const side = isWhite ? 'white' : 'black';
      const tip = document.getElementById(side === 'white' ? 'tip-white' : 'tip-black');
      tip.innerHTML = '';

      const sideSpan = document.createElement('span');
      sideSpan.className = 'tip-side';
      sideSpan.style.color = '#f44336';
      sideSpan.textContent = '💡 后果';
      tip.appendChild(sideSpan);
      tip.appendChild(document.createTextNode(' ' + mistake.punchline));

      const btn = document.createElement('button');
      btn.className = 'mistake-btn';
      btn.textContent = '↩ 回到正确位置';
      btn.onclick = revertFromPunishment;
      tip.appendChild(btn);

      const dismiss = document.createElement('span');
      dismiss.className = 'tip-dismiss';
      dismiss.textContent = '点击泡泡关闭';
      tip.appendChild(dismiss);

      tip.className = 'speech-bubble error-bubble show';
      return;
    }

    renderBoard('practice-board', boards[step + 1], onPracticeClick);
    const m = mistake.punishment[step];
    const tc = m.charCodeAt(2) - 97, tr = 8 - parseInt(m[3]);
    setHighlight('practice-board', tr, tc, true);
    step++;
  }, 800);
}

function revertFromPunishment() {
  if (!punishmentState) return;
  practiceState.board = punishmentState.boardBeforeWrong;
  renderBoard('practice-board', practiceState.board, onPracticeClick);
  practiceState.autoPlaying = false;
  practiceSelected = null;
  punishmentState = null;
  hideAllTips();
  hideFeedback('practice-feedback');
  showFeedback('practice-feedback', '再试一次吧！', 'info');
}

function autoPlayOpponent() {
  if (!practiceState.opening) return;
  if (practiceState.moveIndex >= practiceState.opening.moves.length) return;
  const opening = practiceState.opening;
  const playerSide = opening.playerSide || 'white';
  const isWhiteTurn = practiceState.moveIndex % 2 === 0;
  const isPlayerTurn = (playerSide === 'white' && isWhiteTurn) || (playerSide === 'black' && !isWhiteTurn);
  if (isPlayerTurn) return;

  practiceState.autoPlaying = true;
  autoPlayTimeout = setTimeout(() => {
    const move = opening.moves[practiceState.moveIndex];
    const justCompletedIdx = practiceState.moveIndex;
    practiceState.board = applyMove(practiceState.board, move);
    practiceState.moveIndex++;
    practiceState.maxMoveIndex = practiceState.moveIndex;
    renderBoard('practice-board', practiceState.board, onPracticeClick);
    const tc = move.charCodeAt(2) - 97, tr = 8 - parseInt(move[3]);
    setHighlight('practice-board', tr, tc, true);
    updatePracticeProgress();
    renderPracticeMoves();
    autoExplainMove(justCompletedIdx);
    updateNavButtons();
    practiceState.autoPlaying = false;

    if (practiceState.moveIndex >= opening.moves.length) {
      showFeedback('practice-feedback', '完美！你完成了「' + opening.name + '」的所有走法！', 'success');
      return;
    }
    // 递归检查是否还需要继续自动走（连续对手走法）
    autoPlayOpponent();
  }, 500);
}

function navigateBack() {
  if (!practiceState.opening || practiceState.moveIndex <= 0) return;
  if (autoPlayTimeout) { clearTimeout(autoPlayTimeout); autoPlayTimeout = null; }
  practiceState.autoPlaying = false;
  practiceState.moveIndex--;
  practiceState.browsing = practiceState.moveIndex < practiceState.maxMoveIndex;
  practiceState.board = boardAfterMoves(practiceState.opening.moves.slice(0, practiceState.moveIndex));
  renderBoard('practice-board', practiceState.board, onPracticeClick);
  updatePracticeProgress();
  renderPracticeMoves();
  updateNavButtons();
  practiceSelected = null;
  hideAllTips();
  hideFeedback('practice-feedback');
}

function navigateForward() {
  if (!practiceState.opening || practiceState.moveIndex >= practiceState.maxMoveIndex) return;
  practiceState.moveIndex++;
  practiceState.board = boardAfterMoves(practiceState.opening.moves.slice(0, practiceState.moveIndex));
  practiceState.browsing = practiceState.moveIndex < practiceState.maxMoveIndex;
  renderBoard('practice-board', practiceState.board, onPracticeClick);
  updatePracticeProgress();
  renderPracticeMoves();
  updateNavButtons();
  practiceSelected = null;
  if (!practiceState.browsing) {
    // 回到当前位置，触发自动走对手
    autoPlayOpponent();
  }
}

function updateNavButtons() {
  const backBtn = document.getElementById('nav-back');
  const fwdBtn = document.getElementById('nav-forward');
  if (!backBtn || !fwdBtn) return;
  backBtn.disabled = !practiceState.opening || practiceState.moveIndex <= 0;
  fwdBtn.disabled = !practiceState.opening || practiceState.moveIndex >= practiceState.maxMoveIndex;
}

// 键盘快捷键：左右箭头导航（练习 + demo 模式）
document.addEventListener('keydown', function(e) {
  const practicePanel = document.getElementById('panel-practice');
  if (!practicePanel || !practicePanel.classList.contains('active')) return;
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (demoState) demoPrev();
    else navigateBack();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (demoState) demoAdvance();
    else navigateForward();
  }
});

function showHint() {
  if (!practiceState.opening || practiceState.moveIndex >= practiceState.opening.moves.length) return;
  const move = practiceState.opening.moves[practiceState.moveIndex];
  const fc = move.charCodeAt(0) - 97, fr = 8 - parseInt(move[1]);
  const tc = move.charCodeAt(2) - 97, tr = 8 - parseInt(move[3]);
  clearHighlights('practice-board');
  setHighlight('practice-board', fr, fc, true);
  setHighlight('practice-board', tr, tc, true);
  practiceState.streak = 0;
  updatePracticeProgress();
  showFeedback('practice-feedback', '提示：高亮的两个格子分别是起点和终点', 'info');
}

function resetPractice() {
  if (practiceState.opening) startPractice(practiceState.opening);
}

function pickRandomPractice() {
  const o = OPENINGS[Math.floor(Math.random() * OPENINGS.length)];
  startPractice(o);
}

// ============================================================
// Quiz Mode: Questions about openings
// ============================================================
let quizState = { questions: [], current: 0, score: 0, answered: false };

function startQuiz() {
  // Gather all quiz questions
  const allQ = [];
  OPENINGS.forEach(o => {
    if (o.quiz) {
      o.quiz.forEach(q => allQ.push({ ...q, opening: o }));
    }
  });
  // Shuffle and pick 10
  const shuffled = allQ.sort(() => Math.random() - 0.5).slice(0, 10);
  quizState = { questions: shuffled, current: 0, score: 0, answered: false };
  document.getElementById('quiz-start').style.display = 'none';
  showQuizQuestion();
}

function showQuizQuestion() {
  if (quizState.current >= quizState.questions.length) {
    showFeedback('quiz-feedback', `问答结束！最终得分：${quizState.score}/${quizState.questions.length}`, 'success');
    document.getElementById('quiz-next').style.display = 'none';
    document.getElementById('quiz-start').textContent = '再来一轮';
    document.getElementById('quiz-start').style.display = '';
    return;
  }

  const qObj = quizState.questions[quizState.current];
  quizState.answered = false;
  hideFeedback('quiz-feedback');
  document.getElementById('quiz-next').style.display = 'none';

  // Show board (always from white's perspective in quiz)
  const savedFlipped = boardFlipped; boardFlipped = false;
  const board = boardAfterMoves(qObj.opening.moves);
  renderBoard('quiz-board', board);
  boardFlipped = savedFlipped;

  // Show question
  document.getElementById('quiz-question').textContent = qObj.q;

  // Show options
  const options = [qObj.a, ...qObj.wrong].sort(() => Math.random() - 0.5);
  const container = document.getElementById('quiz-options');
  container.innerHTML = '';
  options.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'quiz-option';
    div.textContent = opt;
    div.addEventListener('click', () => answerQuiz(div, opt, qObj.a));
    container.appendChild(div);
  });

  document.getElementById('quiz-num').textContent = `${quizState.current + 1}/${quizState.questions.length}`;
  document.getElementById('quiz-score').textContent = quizState.score;
}

function answerQuiz(el, selected, correct) {
  if (quizState.answered) return;
  quizState.answered = true;

  const options = document.querySelectorAll('#quiz-options .quiz-option');
  options.forEach(opt => {
    if (opt.textContent === correct) opt.classList.add('correct-answer');
    else if (opt === el && selected !== correct) opt.classList.add('wrong-answer');
  });

  if (selected === correct) {
    quizState.score++;
    showFeedback('quiz-feedback', '✓ 正确！', 'success');
  } else {
    showFeedback('quiz-feedback', `✗ 正确答案是：${correct}`, 'error');
  }

  document.getElementById('quiz-score').textContent = quizState.score;
  const total = quizState.questions.length;
  const done = quizState.current + 1;
  document.getElementById('quiz-rate').textContent = Math.round(quizState.score / done * 100) + '%';
  document.getElementById('quiz-next').style.display = '';
}

function nextQuizQuestion() {
  quizState.current++;
  showQuizQuestion();
}

// ============================================================
// Guess Mode: See board position, guess the opening
// ============================================================
let guessState = { openings: [], current: 0, score: 0, streak: 0, answered: false };

function startGuess() {
  const shuffled = [...OPENINGS].sort(() => Math.random() - 0.5).slice(0, 10);
  guessState = { openings: shuffled, current: 0, score: 0, streak: 0, answered: false };
  document.getElementById('guess-start').style.display = 'none';
  showGuessQuestion();
}

function showGuessQuestion() {
  if (guessState.current >= guessState.openings.length) {
    showFeedback('guess-feedback', `猜题结束！最终得分：${guessState.score}/${guessState.openings.length}`, 'success');
    document.getElementById('guess-next').style.display = 'none';
    document.getElementById('guess-start').textContent = '再来一轮';
    document.getElementById('guess-start').style.display = '';
    return;
  }

  const target = guessState.openings[guessState.current];
  guessState.answered = false;
  hideFeedback('guess-feedback');
  document.getElementById('guess-next').style.display = 'none';

  // Render target position (always from white's perspective in guess)
  const savedFlipped = boardFlipped; boardFlipped = false;
  const board = boardAfterMoves(target.moves);
  renderBoard('guess-board', board);
  boardFlipped = savedFlipped;

  // Show hint with move count
  document.getElementById('guess-hint').textContent = `这个局面经过了 ${target.moves.length} 步棋，属于「${target.category}」类别。`;

  // Generate 4 options including the correct one
  const wrong = OPENINGS.filter(o => o.name !== target.name).sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [target, ...wrong].sort(() => Math.random() - 0.5);

  const container = document.getElementById('guess-options');
  container.innerHTML = '';
  options.forEach(o => {
    const div = document.createElement('div');
    div.className = 'quiz-option';
    div.textContent = o.name;
    div.addEventListener('click', () => answerGuess(div, o.name, target));
    container.appendChild(div);
  });

  document.getElementById('guess-num').textContent = `${guessState.current + 1}/${guessState.openings.length}`;
  document.getElementById('guess-score').textContent = guessState.score;
  document.getElementById('guess-streak').textContent = guessState.streak;
}

function answerGuess(el, selected, target) {
  if (guessState.answered) return;
  guessState.answered = true;

  const options = document.querySelectorAll('#guess-options .quiz-option');
  options.forEach(opt => {
    if (opt.textContent === target.name) opt.classList.add('correct-answer');
    else if (opt === el && selected !== target.name) opt.classList.add('wrong-answer');
  });

  if (selected === target.name) {
    guessState.score++;
    guessState.streak++;
    showFeedback('guess-feedback', `✓ 正确！${target.desc}`, 'success');
  } else {
    guessState.streak = 0;
    showFeedback('guess-feedback', `✗ 这是「${target.name}」(${target.pgn})。${target.desc}`, 'error');
  }

  document.getElementById('guess-score').textContent = guessState.score;
  document.getElementById('guess-streak').textContent = guessState.streak;
  document.getElementById('guess-next').style.display = '';
}

function nextGuess() {
  guessState.current++;
  showGuessQuestion();
}

// Init with empty boards
renderBoard('practice-board', cloneBoard(INITIAL_BOARD));
renderBoard('quiz-board', cloneBoard(INITIAL_BOARD));
renderBoard('guess-board', cloneBoard(INITIAL_BOARD));

// ============================================================
// Board Tooltip & Demo System
// ============================================================
function showTip(side, text) {
  const tip = document.getElementById(side === 'white' ? 'tip-white' : 'tip-black');
  tip.innerHTML = text + '<span class="tip-dismiss">✕</span>';
  tip.classList.add('show');
}

function hideAllTips() {
  document.getElementById('tip-white').classList.remove('show');
  document.getElementById('tip-black').classList.remove('show');
}

function autoExplainMove(moveIdx) {
  const o = practiceState.opening;
  if (!o || !o.moveExplain || !o.moveExplain[moveIdx]) return;
  const isWhite = moveIdx % 2 === 0;
  const sideLabel = isWhite ? '<span class="tip-side">⬜ 白方</span>' : '<span class="tip-side">⬛ 黑方</span>';
  showTip(isWhite ? 'white' : 'black', `${sideLabel} ${o.moveExplain[moveIdx]}`);

  // If last move and opening has continuation, show the demo panel
  if (moveIdx === o.moves.length - 1 && o.continuation) {
    setTimeout(() => showDemoPanel(), 1500);
  }
}

function showDemoPanel() {
  const o = practiceState.opening;
  if (!o || !o.continuation) return;
  const panel = document.getElementById('demo-panel');
  const msgs = document.getElementById('demo-messages');
  panel.style.display = '';
  msgs.innerHTML = '';
  addDemoMsg(`<b>${o.continuation.label}</b><br>用 ← → 键逐步浏览后续走法`);
  // Auto-start demo without requiring button click
  playDemo(null);
}

let demoPlaying = false;
let demoState = null;

function playDemo(btnId) {
  const o = practiceState.opening;
  if (!o || !o.continuation) return;
  const btn = document.getElementById(btnId);
  if (btn) btn.style.display = 'none';

  demoPlaying = true;
  // Build ALL board states: initial → opening moves → continuation moves
  const allMoves = [...o.moves, ...o.continuation.moves];
  const allExplain = [...(o.moveExplain || []), ...o.continuation.explain];
  const boards = [cloneBoard(INITIAL_BOARD)];
  let b = cloneBoard(INITIAL_BOARD);
  for (const m of allMoves) {
    b = applyMove(b, m);
    boards.push(cloneBoard(b));
  }
  const openingLen = o.moves.length;
  demoState = {
    allMoves: allMoves,
    allExplain: allExplain,
    boards: boards,
    openingLen: openingLen,
    step: openingLen,  // start at the end of opening (beginning of continuation)
    msgCount: 0,
    total: allMoves.length
  };

  demoState.msgCount = 0;
  document.getElementById('demo-nav').style.display = '';
  document.body.classList.add('panel-practice-demo-active');
  demoShowStep(openingLen);
}

function demoShowStep(idx) {
  if (!demoState) return;
  const { allMoves, allExplain, boards, openingLen, total } = demoState;
  idx = Math.max(0, Math.min(idx, total));
  demoState.step = idx;

  // Render board state
  renderBoard('practice-board', boards[idx]);

  // Highlight destination square and detect capture
  if (idx > 0) {
    const move = allMoves[idx - 1];
    const tc = move.charCodeAt(2) - 97, tr = 8 - parseInt(move[3]);
    const prevBoard = boards[idx - 1];
    const wasCapture = prevBoard[tr][tc] !== '';
    setHighlight('practice-board', tr, tc, true);
    if (wasCapture) {
      highlightSquare('practice-board', tr, tc, 'capture');
    }
  }

  // Show explanation bubble
  hideAllTips();
  if (idx > 0 && allExplain[idx - 1]) {
    const i = idx - 1;
    const isWhite = i % 2 === 0;  // move 0=white, 1=black, etc (from the very start)
    const sideLabel = isWhite ? '<span class="tip-side">⬜</span>' : '<span class="tip-side">⬛</span>';
    showTip(isWhite ? 'white' : 'black', `${sideLabel} ${allExplain[i]}`);
  }

  // Label: which phase are we in?
  const inOpening = idx <= openingLen;
  const contStep = idx - openingLen;
  const contTotal = total - openingLen;

  // Add messages for continuation steps only (going forward)
  if (contStep > 0 && contStep > demoState.msgCount) {
    for (let j = demoState.msgCount; j < contStep; j++) {
      const mi = openingLen + j;
      if (allExplain[mi]) {
        const isWhite = mi % 2 === 0;
        const sideIcon = isWhite ? '⬜' : '⬛';
        addDemoMsg(`${sideIcon} ${allExplain[mi]}`);
      }
    }
    demoState.msgCount = contStep;
  }

  // Update buttons
  const prevBtn = document.getElementById('demo-prev');
  const advBtn = document.getElementById('demo-advance');
  prevBtn.disabled = idx <= 0;
  if (idx >= total) {
    advBtn.textContent = '← 可后退浏览';
    advBtn.disabled = true;
  } else {
    advBtn.disabled = false;
    if (inOpening) {
      advBtn.textContent = `下一步 → 开局 (${idx}/${openingLen})`;
    } else {
      advBtn.textContent = `下一步 → (${contStep}/${contTotal})`;
    }
  }
}

function demoAdvance() {
  if (!demoState) return;
  if (demoState.step >= demoState.total) return;
  demoShowStep(demoState.step + 1);
  // Show completion message when reaching the end
  if (demoState.step >= demoState.total) {
    addDemoMsg('✓ 演示结束！可以按 ← 回看，或点「重新开始」重新练习。');
  }
}

function demoPrev() {
  if (!demoState || demoState.step <= 0) return;
  demoShowStep(demoState.step - 1);
}

function addDemoMsg(text) {
  const container = document.getElementById('demo-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg bot';
  div.innerHTML = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

</script>
